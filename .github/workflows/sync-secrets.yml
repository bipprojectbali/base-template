name: Sync Secrets to All Repos

on:
    workflow_dispatch:

env:
    OWNER: bipprojectbali
    SOURCE_REPO: base-template

jobs:
    sync:
        name: Sync environment secrets to all repos
        runs-on: ubuntu-latest
        environment: ${{ vars.PORTAINER_ENV || 'portainer' }}
        permissions:
            contents: read
        steps:
            - name: Checkout source repo
              uses: actions/checkout@v4
              with:
                  repository: ${{ env.OWNER }}/${{ env.SOURCE_REPO }}

            - name: Sync secrets to all repos
              run: bash ./.github/workflows/script/sync-secrets-action.sh
              env:
                  GH_TOKEN: ${{ secrets.PAT_TOKEN }}
                  TARGET_OWNER: ${{ env.OWNER }}
                  ENV_NAME: portainer
                  SECRET_PORTAINER_PASSWORD: ${{ secrets.PORTAINER_PASSWORD }}
                  SECRET_PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
                  SECRET_PORTAINER_USERNAME: ${{ secrets.PORTAINER_USERNAME }}
                  SECRET_TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
                  SECRET_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

            - name: Notify success
              if: success()
              run: bash ./.github/workflows/script/notify.sh
              env:
                  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
                  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
                  NOTIFY_STATUS: success
                  NOTIFY_WORKFLOW: "Sync Secrets"
                  NOTIFY_DETAIL: "Source: ${{ env.OWNER }}/${{ env.SOURCE_REPO }}"

            - name: Notify failure
              if: failure()
              run: bash ./.github/workflows/script/notify.sh
              env:
                  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
                  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
                  NOTIFY_STATUS: failure
                  NOTIFY_WORKFLOW: "Sync Secrets"
                  NOTIFY_DETAIL: "Source: ${{ env.OWNER }}/${{ env.SOURCE_REPO }}"
